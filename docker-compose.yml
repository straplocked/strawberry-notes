services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: strawberry-notes:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://strawberry:${POSTGRES_PASSWORD:-strawberry}@postgres:5432/strawberry
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3200}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      # Semantic search (optional). Leave EMBEDDING_ENDPOINT empty to disable.
      # Any provider that speaks OpenAI's `POST /v1/embeddings` shape works
      # (OpenAI, Ollama, llama.cpp server, LM Studio, vLLM, etc.).
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_DIMS: ${EMBEDDING_DIMS:-1024}
    ports:
      # Host port 3200 chosen to avoid collisions with other local containers
      # (3000 / 3100 were already in use). Override via APP_PORT in .env.
      - "${APP_PORT:-3200}:3000"
    volumes:
      - uploads:/data
    healthcheck:
      # Alpine has no curl; use Node's built-in fetch to probe /api/health.
      # Exit 0 only when the endpoint returns 2xx (DB ping succeeded too).
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    # pgvector/pgvector bundles the `vector` extension on top of the stock
    # postgres:16 image — used by the semantic-search feature (drizzle/0005_embeddings.sql).
    # Operators who do not want the extension can pin `postgres:16-alpine` back;
    # the migration only runs `CREATE EXTENSION IF NOT EXISTS vector`, so a base
    # image without `vector` available would fail migration at boot.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: strawberry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strawberry}
      POSTGRES_DB: strawberry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strawberry -d strawberry"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  uploads:
